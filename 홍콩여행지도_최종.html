<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>홍콩 여행 지도</title>
<style>
:root{--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);--bg:#0d1b2a;--card:#1a2a3a;--bdr:#243547;--gold:#FFD700;--sub:#8fa3b1}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'Malgun Gothic',sans-serif;color:#fff}
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
/* Leaflet 내장 CSS */
.leaflet-pane,.leaflet-tile,.leaflet-marker-icon,.leaflet-marker-shadow,.leaflet-tile-container,.leaflet-map-pane svg,.leaflet-map-pane canvas,.leaflet-zoom-box,.leaflet-image-layer,.leaflet-layer{position:absolute;left:0;top:0}
.leaflet-container{overflow:hidden}
.leaflet-tile,.leaflet-marker-icon,.leaflet-marker-shadow{-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
.leaflet-tile::selection{background:transparent}
.leaflet-tile::-moz-selection{background:transparent}
.leaflet-image-layer,.leaflet-layer,.leaflet-marker-shadow{pointer-events:none!important}
.leaflet-pane{z-index:400}
.leaflet-tile-pane{z-index:200}
.leaflet-overlay-pane{z-index:400}
.leaflet-shadow-pane{z-index:500}
.leaflet-marker-pane{z-index:600}
.leaflet-tooltip-pane{z-index:650}
.leaflet-popup-pane{z-index:700}
.leaflet-map-pane canvas{z-index:100}
.leaflet-map-pane svg{z-index:200}
.leaflet-zoom-animated{-webkit-transform-origin:left top;transform-origin:left top}
.leaflet-zoom-animated{transition:-webkit-transform .25s cubic-bezier(0,0,.25,1);transition:transform .25s cubic-bezier(0,0,.25,1)}
.leaflet-pan-animated{transition:left .25s,top .25s}
.leaflet-container{background:#303030;outline-offset:1px;-webkit-tap-highlight-color:transparent}
.leaflet-container a.leaflet-active{outline:2px solid orange}
.leaflet-zoom-box{border:2px dotted #38f;background:rgba(255,255,255,.5)}
.leaflet-control{position:relative;z-index:800;pointer-events:visiblePainted;pointer-events:auto}
.leaflet-top,.leaflet-bottom{position:absolute;z-index:1000;pointer-events:none}
.leaflet-top{top:0}.leaflet-right{right:0}.leaflet-bottom{bottom:0}.leaflet-left{left:0}
.leaflet-control{float:left;clear:both}.leaflet-right .leaflet-control{float:right}
.leaflet-top .leaflet-control{margin-top:10px}.leaflet-bottom .leaflet-control{margin-bottom:10px}
.leaflet-left .leaflet-control{margin-left:10px}.leaflet-right .leaflet-control{margin-right:10px}
.leaflet-fade-anim .leaflet-popup{opacity:0;transition:opacity .2s linear}.leaflet-fade-anim .leaflet-map-pane .leaflet-popup{opacity:1}
.leaflet-zoom-animated .leaflet-zoom-hide{visibility:hidden}
.leaflet-control-zoom a,.leaflet-bar a{background-color:#fff;border-bottom:1px solid #ccc;width:26px;height:26px;line-height:26px;display:block;text-align:center;text-decoration:none;color:black}
.leaflet-touch .leaflet-control-zoom a,.leaflet-touch .leaflet-bar a{width:30px;height:30px;line-height:30px}
.leaflet-bar a:hover,.leaflet-bar a:focus{background-color:#f4f4f4}
.leaflet-bar a:first-child{border-top-left-radius:4px;border-top-right-radius:4px}
.leaflet-bar a:last-child{border-bottom-left-radius:4px;border-bottom-right-radius:4px;border-bottom:none}
.leaflet-bar a.leaflet-disabled{cursor:default;background-color:#f4f4f4;color:#bbb}
.leaflet-touch .leaflet-bar{box-shadow:none;border:2px solid rgba(0,0,0,.2)}
.leaflet-control-zoom-in,.leaflet-control-zoom-out{font:bold 18px 'Lucida Console',Monaco,monospace;text-indent:1px}
.leaflet-touch .leaflet-control-zoom-in{font-size:22px}.leaflet-touch .leaflet-control-zoom-out{font-size:20px}
.leaflet-control-attribution{background:rgba(255,255,255,.7);margin:0}.leaflet-control-attribution.leaflet-control{padding:0 5px;font-size:11px}
.leaflet-left .leaflet-control-scale{margin-left:5px}.leaflet-bottom .leaflet-control-scale{margin-bottom:5px}
.leaflet-control-scale-line{border:2px solid #777;border-top:none;line-height:1.1;padding:2px 5px 1px;font-size:11px;white-space:nowrap;overflow:hidden;box-sizing:border-box;background:rgba(255,255,255,.5)}
.leaflet-control-scale-line:not(:first-child){border-top:2px solid #777;border-bottom:none;margin-top:-2px}
.leaflet-popup{position:absolute;text-align:center;margin-bottom:20px}
.leaflet-popup-content-wrapper{padding:1px;text-align:left;border-radius:12px}
.leaflet-popup-tip-container{width:40px;height:20px;position:absolute;left:50%;margin-left:-20px;overflow:hidden;pointer-events:none}
.leaflet-popup-tip{width:17px;height:17px;padding:1px;margin:-10px auto 0;pointer-events:auto;transform:rotate(45deg)}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:white;color:#333;box-shadow:0 3px 14px rgba(0,0,0,.4)}
.leaflet-container a.leaflet-popup-close-button{position:absolute;top:0;right:0;border:none;text-align:center;width:24px;height:24px;font:16px/24px Tahoma,Verdana,sans-serif;color:#757575;text-decoration:none;background:transparent}
.leaflet-container a.leaflet-popup-close-button:hover,.leaflet-container a.leaflet-popup-close-button:focus{color:#585858}
.leaflet-popup-scrolled{overflow:auto}
.leaflet-popup-content{margin:13px 19px 13px 20px!important;line-height:1.3}
.leaflet-marker-icon,.leaflet-marker-shadow{display:block}
img.leaflet-image-layer,img.leaflet-tile{max-width:none!important;max-height:none!important;width:auto;padding:0}
.leaflet-div-icon{background:#fff;border:1px solid #666}
/* 헤더 */
#hd{position:fixed;top:0;left:0;right:0;z-index:800;background:rgba(13,27,42,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:calc(var(--st) + 10px) 14px 10px;border-bottom:1px solid var(--bdr)}
#hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
#hd-top h1{font-size:15px;font-weight:800}
#hd-top h1 span{color:var(--gold)}
#badge{background:var(--gold);color:#000;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
#dscroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
#dscroll::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;padding:6px 12px;border-radius:18px;border:2px solid transparent;font-size:11px;font-weight:700;color:#fff;line-height:1.4;text-align:center;cursor:pointer}
.dp.on{border-color:rgba(255,255,255,.85);box-shadow:0 0 8px rgba(255,255,255,.2)}
/* 바텀시트 */
#sh{position:fixed;left:0;right:0;bottom:0;z-index:800;background:var(--card);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr);display:flex;flex-direction:column;max-height:85vh;padding-bottom:var(--sb);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#sh.c{transform:translateY(calc(100% - 70px))}
#sh.h{transform:translateY(40%)}
#sh.f{transform:translateY(0)}
#sha{padding:10px 0 0;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;flex-shrink:0}
#hbar{width:36px;height:4px;background:var(--bdr);border-radius:2px}
#shh{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;flex-shrink:0}
#sht{font-size:13px;font-weight:700}
#shc{font-size:12px;color:var(--gold);font-weight:700}
#crow{display:flex;gap:7px;padding:0 14px 9px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#crow::-webkit-scrollbar{display:none}
.cp{flex-shrink:0;padding:5px 12px;border-radius:14px;border:1.5px solid var(--bdr);font-size:12px;font-weight:600;background:transparent;color:var(--sub);cursor:pointer}
.cp.on{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.07)}
#pl{flex:1;overflow-y:auto;padding:0 12px 10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#pl::-webkit-scrollbar{display:none}
.dl{font-size:11px;font-weight:800;padding:9px 3px 5px;display:flex;align-items:center;gap:6px;position:sticky;top:0;background:var(--card);z-index:2}
.dd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pc{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;margin-bottom:5px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid var(--bdr);cursor:pointer}
.pc:active{background:rgba(255,255,255,.1)}
.pi{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pn{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px}
.pm{display:flex;gap:5px;flex-wrap:wrap}
.pt{font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px}
.pd{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.5}
.pa{color:var(--sub);font-size:18px;flex-shrink:0;margin-top:1px}
/* FAB */
.fab{position:fixed;right:14px;z-index:810;width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.5)}
#fb1{bottom:calc(78px + var(--sb))}
#fb2{bottom:calc(130px + var(--sb))}
/* 팝업 */
.leaflet-popup-content-wrapper{background:#1a2a3a!important;color:#fff!important;border-radius:14px!important;border:1px solid #243547!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:#1a2a3a!important}
.pt2{font-size:14px;font-weight:800;margin-bottom:6px;line-height:1.3}
.pb{padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;display:inline-block;margin-right:4px;margin-bottom:2px}
.pdesc{font-size:12px;color:#8fa3b1;line-height:1.6;margin-top:5px}
/* 검색 */
#so{position:fixed;inset:0;z-index:900;background:rgba(13,27,42,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;flex-direction:column;padding-top:calc(var(--st) + 12px);padding-bottom:var(--sb)}
#so.open{display:flex}
#stop{display:flex;align-items:center;gap:10px;padding:0 14px 12px}
#si{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 14px;color:#fff;font-size:15px;outline:none;-webkit-appearance:none;-webkit-border-radius:12px}
#si::placeholder{color:var(--sub)}
#sc{color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
#sr{flex:1;overflow-y:auto;padding:0 12px;-webkit-overflow-scrolling:touch}
#sr::-webkit-scrollbar{display:none}
.sh{padding:10px 4px;font-size:12px;color:var(--sub)}
/* 범례 */
#lp{position:fixed;bottom:calc(130px + var(--sb));right:66px;z-index:810;background:rgba(26,42,58,.97);border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;display:none;backdrop-filter:blur(12px);max-width:195px}
#lp.open{display:block}
.lt{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:7px}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:3px}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="map"></div>

<div id="hd">
  <div id="hd-top">
    <h1>🗺️ 홍콩 5박 6일 <span>완전 정복</span></h1>
    <div id="badge">106곳</div>
  </div>
  <div id="dscroll">
    <button class="dp on" style="background:#3d4f5c" onclick="fDay(0)">🗺️ 전체</button>
    <button class="dp" style="background:#E74C3C" onclick="fDay(1)">Day 1<br><span style="font-size:9px;opacity:.85">침사추이</span></button>
    <button class="dp" style="background:#E67E22" onclick="fDay(2)">Day 2<br><span style="font-size:9px;opacity:.85">홍콩섬</span></button>
    <button class="dp" style="background:#27AE60" onclick="fDay(3)">Day 3<br><span style="font-size:9px;opacity:.85">란타우</span></button>
    <button class="dp" style="background:#2980B9" onclick="fDay(4)">Day 4<br><span style="font-size:9px;opacity:.85">몽콕</span></button>
    <button class="dp" style="background:#8E44AD" onclick="fDay(5)">Day 5<br><span style="font-size:9px;opacity:.85">포토스팟</span></button>
    <button class="dp" style="background:#16A085" onclick="fDay(6)">Day 6<br><span style="font-size:9px;opacity:.85">위안랑</span></button>
    <button class="dp" style="background:#C0392B" onclick="fDay(7)">🎰 마카오<br><span style="font-size:9px;opacity:.85">보너스</span></button>
  </div>
</div>

<div id="sh" class="c">
  <div id="sha" onclick="cyc()">
    <div id="hbar"></div>
    <div id="shh"><div id="sht">📍 전체 장소</div><div id="shc">106곳 ↑</div></div>
  </div>
  <div id="crow">
    <button class="cp on" onclick="fCat('',event)">전체</button>
    <button class="cp" onclick="fCat('관광',event)">🏛️ 관광</button>
    <button class="cp" onclick="fCat('맛집',event)">🍜 맛집</button>
    <button class="cp" onclick="fCat('야경',event)">🌃 야경</button>
  </div>
  <div id="pl"></div>
</div>

<div id="fb2" class="fab" onclick="tLeg()">🎨</div>
<div id="fb1" class="fab" onclick="oSrc()">🔍</div>

<div id="lp">
  <div class="lt">📅 일차별 색상</div>
  <div class="lr"><div class="ld" style="background:#E74C3C"></div>Day 1 침사추이·구룡</div>
  <div class="lr"><div class="ld" style="background:#E67E22"></div>Day 2 홍콩섬 센트럴</div>
  <div class="lr"><div class="ld" style="background:#27AE60"></div>Day 3 란타우 섬</div>
  <div class="lr"><div class="ld" style="background:#2980B9"></div>Day 4 구룡 동부·몽콕</div>
  <div class="lr"><div class="ld" style="background:#8E44AD"></div>Day 5 포토스팟·남부</div>
  <div class="lr"><div class="ld" style="background:#16A085"></div>Day 6 위안랑·귀국</div>
  <div class="lr"><div class="ld" style="background:#C0392B"></div>🎰 보너스 마카오</div>
  <div class="lt" style="margin-top:8px">🏷️ 카테고리</div>
  <div class="lr">🏛️ 관광명소</div>
  <div class="lr">🍜 맛집·카페</div>
  <div class="lr">🌃 야경·나이트</div>
</div>

<div id="so">
  <div id="stop">
    <input id="si" type="search" placeholder="🔍 장소, 음식, 지역 검색..." oninput="dSrc()" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="sc" onclick="cSrc()">취소</div>
  </div>
  <div id="sr"><div class="sh">예: 딤섬 · 야경 · 미슐랭 · 마카오</div></div>
</div>

<!-- Leaflet JS (인라인 스크립트 다음에 로드) -->
<script>

/* ─── Leaflet 동적 로드 ─── */
function loadLeaflet(cb){
  if(window.L&&window.L.map){cb();return;}
  const css=document.createElement('link');
  css.rel='stylesheet';
  // jsDelivr CDN 사용 (안정적)
  css.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css';
  document.head.appendChild(css);
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js';
  s.onload=cb;
  s.onerror=function(){
    // fallback: unpkg
    const s2=document.createElement('script');
    s2.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s2.onload=cb;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

let map;
function initMap(){

  map=L.map('map',{center:[22.32,114.17],zoom:12,zoomControl:false,attributionControl:false});

  const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'});
  // 다크 타일 (CartoDB)
  const dark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,attribution:'© CARTO'});
  dark.on('tileerror',function(){osm.addTo(map);});
  dark.addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  L.control.attribution({position:'bottomleft',prefix:'© CARTO / OSM'}).addTo(map);
  map.on('click',function(){if(ss!=='c')setSS('c');document.getElementById('lp').classList.remove('open');});
  renderMkrs();
}

window.addEventListener('load',function(){

    className:'',
    html:'<div style="background:'+c+';width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.5)">'+e+'</div>',
    iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18]
  });
}
function renderMkrs(){
  mkrs.forEach(m=>map.removeLayer(m.m));
  mkrs=[];
  const flt=L_DATA.filter(l=>(cDay===0||l.day===cDay)&&(cCat===''||l.cat===cCat));
  flt.forEach(loc=>{
    const m=L.marker([loc.lat,loc.lng],{icon:mkIcon(loc.day,loc.cat)});
    const c=DC[loc.day],e=CI[loc.cat]||'📍';
    const dl=loc.day===7?'🎰 마카오':'Day '+loc.day;
    m.bindPopup(
      '<div class="pt2">'+e+' '+loc.name+'</div>'+
      '<div><span class="pb" style="background:'+c+'25;color:'+c+';border:1px solid '+c+'">'+dl+'</span>'+
      '<span class="pb" style="background:#1e2a1a;color:#6fcf72">'+loc.cat+'</span></div>'+
      '<div class="pdesc">'+loc.desc+'</div>',
      {maxWidth:240}
    );
    m.addTo(map);
    mkrs.push({m:m,loc:loc});
  });
  document.getElementById('shc').textContent=flt.length+'곳 '+(ss==='c'?'↑':'↓');
  renderList(flt);
}

/* ─── 목록 렌더 ─── */
function renderList(flt){
  const g={};
  flt.forEach(l=>{if(!g[l.day])g[l.day]=[];g[l.day].push(l);});
  let h='';
  Object.keys(g).sort((a,b)=>+a-+b).forEach(d=>{
    const c=DC[d];
    const dl=d==='7'?'🎰 보너스 — 마카오 당일치기':'Day '+d+' — '+DN[d];
    h+='<div class="dl"><div class="dd" style="background:'+c+'"></div><span style="color:'+c+'">'+dl+'</span></div>';
    g[d].forEach(loc=>{
      const e=CI[loc.cat]||'📍',c2=DC[loc.day];
      const cc=loc.cat==='관광'?'#3498db':loc.cat==='맛집'?'#e67e22':'#9b59b6';
      const tl=d==='7'?'보너스':'Day '+loc.day;
      h+='<div class="pc" onclick="flyTo('+loc.lat+','+loc.lng+','+loc.day+')">'+
        '<div class="pi" style="background:'+c2+'20">'+e+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="pn">'+loc.name+'</div>'+
          '<div class="pm">'+
            '<span class="pt" style="background:'+c2+'20;color:'+c2+'">'+tl+'</span>'+
            '<span class="pt" style="background:'+cc+'20;color:'+cc+'">'+loc.cat+'</span>'+
          '</div>'+
          '<div class="pd">'+loc.desc+'</div>'+
        '</div>'+
        '<div class="pa">›</div>'+
      '</div>';
    });
  });
  document.getElementById('pl').innerHTML=h||'<div style="text-align:center;color:#8fa3b1;padding:30px;font-size:13px">해당 장소가 없습니다</div>';
  const dt=cDay===0?'전체 장소':cDay===7?'🎰 마카오':'Day '+cDay+' '+DN[cDay];
  document.getElementById('sht').textContent='📍 '+dt+(cCat?' · '+cCat:'');
}

function flyTo(lat,lng,day){
  setSS('c');
  setTimeout(function(){
    map.flyTo([lat,lng],16,{duration:1.0});
    const f=mkrs.find(m=>m.loc.lat===lat&&m.loc.lng===lng);
    if(f)setTimeout(function(){f.m.openPopup();},1100);
  },200);
}

/* ─── 필터 ─── */
function fDay(d){
  cDay=d;
  document.querySelectorAll('.dp').forEach((b,i)=>b.classList.toggle('on',i===d));
  renderMkrs();
  if(d===7){map.flyTo([22.18,113.55],13,{duration:1.2});}
  else if(d>0){
    const ls=L_DATA.filter(l=>l.day===d);
    if(ls.length)map.fitBounds(L.latLngBounds(ls.map(l=>[l.lat,l.lng])),{padding:[60,60]});
  } else{map.setView([22.32,114.17],12);}
}
function fCat(cat,e){
  if(e)e.stopPropagation();
  cCat=cat;
  document.querySelectorAll('.cp').forEach(b=>b.classList.toggle('on',(cat===''&&b.textContent==='전체')||(cat!==''&&b.textContent.includes(cat))));
  renderMkrs();
}

/* ─── 바텀시트 ─── */
function setSS(s){
  ss=s;
  const el=document.getElementById('sh');
  el.className=s;
  const c=document.getElementById('shc');
  c.textContent=c.textContent.replace(/[↑↓]/,s==='c'?'↑':'↓');
}
function cyc(){setSS(ss==='c'?'h':ss==='h'?'f':'c');}

let ty=0;
document.getElementById('sha').addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
document.getElementById('sha').addEventListener('touchend',e=>{
  const d=ty-e.changedTouches[0].clientY;
  if(Math.abs(d)>25)setSS(d>0?(ss==='c'?'h':'f'):(ss==='f'?'h':'c'));
},{passive:true});

/* ─── 검색 ─── */
function oSrc(){document.getElementById('so').classList.add('open');setTimeout(()=>document.getElementById('si').focus(),150);}
function cSrc(){document.getElementById('so').classList.remove('open');document.getElementById('si').value='';document.getElementById('sr').innerHTML='<div class="sh">예: 딤섬 · 야경 · 미슐랭 · 마카오</div>';}
function dSrc(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  if(!q){document.getElementById('sr').innerHTML='<div class="sh">예: 딤섬 · 야경 · 미슐랭 · 마카오</div>';return;}
  const rs=L_DATA.filter(l=>l.name.toLowerCase().includes(q)||l.desc.toLowerCase().includes(q)||l.cat.includes(q)||DN[l.day].includes(q));
  let h=rs.length===0?'<div style="text-align:center;color:#8fa3b1;padding:40px;font-size:14px">🔍 결과가 없습니다</div>':'<div class="sh">'+rs.length+'개 결과</div>';
  rs.forEach(loc=>{
    const c=DC[loc.day],e=CI[loc.cat]||'📍';
    const cc=loc.cat==='관광'?'#3498db':loc.cat==='맛집'?'#e67e22':'#9b59b6';
    const tl=loc.day===7?'보너스':'Day '+loc.day;
    h+='<div class="pc" onclick="sSrc('+loc.lat+','+loc.lng+','+loc.day+')">'+
      '<div class="pi" style="background:'+c+'20">'+e+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="pn">'+loc.name+'</div>'+
        '<div class="pm"><span class="pt" style="background:'+c+'20;color:'+c+'">'+tl+'</span><span class="pt" style="background:'+cc+'20;color:'+cc+'">'+loc.cat+'</span></div>'+
        '<div class="pd">'+loc.desc+'</div>'+
      '</div>'+
      '<div class="pa">›</div>'+
    '</div>';
  });
  document.getElementById('sr').innerHTML=h;
}
function sSrc(lat,lng,day){
  cSrc();
  setTimeout(function(){
    map.flyTo([lat,lng],16,{duration:1.0});
    const f=mkrs.find(m=>m.loc.lat===lat&&m.loc.lng===lng);
    if(f)setTimeout(function(){f.m.openPopup();},1100);
  },200);
}
function tLeg(){document.getElementById('lp').classList.toggle('open');}
</script>
</body>
</html>
